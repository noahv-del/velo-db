services:
    db:
        image: postgres:17.2-alpine
        restart: always
        environment:
            POSTGRES_DB: 'ridesdwh'
            POSTGRES_USER: 'postgres'
            POSTGRES_PASSWORD: 'postgres'
        ports:
            - '5435:5432'
        volumes:
            - db-data:/var/lib/postgresql/data
volumes:
    db-data: